<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fondo Tecnológico de Movilian</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Evitar barras de desplazamiento */
            color: white;
        }

        /* --- Estructura del Fondo Robótico --- */
        .robotics-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #010313; /* Fondo base muy oscuro (negro azulado) */
            overflow: hidden;
            z-index: -1; /* Colocar detrás de todo el contenido */
        }

        /* --- Capa de Brillo Neón (Cian/Azul) --- */
        .robotics-background::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                /* Brillo cian en el centro */
                radial-gradient(circle at center, rgba(0, 212, 255, 0.15) 0%, rgba(0, 212, 255, 0) 60%),
                /* Brillo cian en la esquina inferior derecha */
                radial-gradient(circle at bottom right, rgba(0, 212, 255, 0.08) 0%, rgba(0, 212, 255, 0) 40%),
                /* Brillo cian en la esquina superior izquierda */
                radial-gradient(circle at top left, rgba(0, 212, 255, 0.05) 0%, rgba(0, 212, 255, 0) 30%);
            z-index: 1; /* Sobre la base, bajo el patrón */
        }

        /* --- Capa del Patrón de Circuitos y Puntos --- */
        .robotics-background::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Patrón repetitivo de líneas de circuitos y puntos */
            background-image:
                /* Líneas horizontales */
                linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
                /* Líneas verticales */
                linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px),
                /* Puntos de nodo (como microchips) */
                radial-gradient(rgba(0, 212, 255, 0.08) 1.5px, transparent 1.5px);
            background-size: 50px 50px, 50px 50px, 50px 50px; /* Tamaño del patrón repetitivo */
            z-index: 2; /* Sobre el brillo, bajo el contenido */
            opacity: 0.6; /* Un poco de transparencia para integrar */
        }

        /* --- Estilo de ejemplo para el Contenido sobre el fondo --- */
        .content {
            z-index: 10;
            text-align: center;
            padding: 40px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            background-color: rgba(2, 6, 23, 0.85); /* Fondo oscuro translúcido para el contenido */
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.15); /* Brillo neón suave */
            backdrop-filter: blur(8px); /* Efecto de desenfoque de fondo */
            max-width: 600px;
        }

        .content h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to bottom, white, rgba(0, 212, 255, 0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
        }

        .content .cta-button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            border: 2px solid #00d4ff;
            border-radius: 30px;
            color: #00d4ff;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .content .cta-button:hover {
            background-color: #00d4ff;
            color: #010313;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="robotics-background"></div>

    <div class="content">
        <h1>MOVILIAN</h1>
        <p>Especialistas en la reparación de dispositivos tecnológicos de vanguardia. Desde micro-soldadura hasta recuperación de datos complejos.</p>
        <a href="/movile/frontend/movile.php" class="cta-button">Ver Servicios</a>
    </div>
</body>
</html>
